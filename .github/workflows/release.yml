name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.5, v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.14"]
        group:
          - name: fast
            marker: "not slow"
          - name: slow-1
            marker: "slow"
            split_group: 1
          - name: slow-2
            marker: "slow"
            split_group: 2
          - name: slow-3
            marker: "slow"
            split_group: 3

    name: test (py${{ matrix.python-version }}, ${{ matrix.group.name }})

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"
          allow-prereleases: true
          cache: "pip"
          cache-dependency-path: koan/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r koan/requirements.txt
          pip install pytest pytest-split pytest-cov

      - name: Run tests (${{ matrix.group.name }})
        working-directory: koan
        env:
          KOAN_ROOT: ${{ github.workspace }}/koan
          PYTHONPATH: "."
          KOAN_TELEGRAM_TOKEN: "fake-token-for-ci"
          KOAN_TELEGRAM_CHAT_ID: "123456789"
        run: |
          if [ -n "${{ matrix.group.split_group }}" ]; then
            pytest tests/ -m "${{ matrix.group.marker }}" --splits 3 --group ${{ matrix.group.split_group }} -v \
              --cov=app --cov-report=term-missing
          else
            pytest tests/ -m "${{ matrix.group.marker }}" -v \
              --cov=app --cov-report=term-missing
          fi

  release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+(\.[0-9]+){1,2}$'; then
            echo "::error::Version must match vMAJOR.MINOR or vMAJOR.MINOR.PATCH (e.g. v0.5, v1.0.0)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Check for commits since last tag
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
            COMMIT_COUNT=$(git rev-list --count "$RANGE")
            if [ "$COMMIT_COUNT" -eq 0 ]; then
              echo "::error::No commits since $LAST_TAG — nothing to release"
              exit 1
            fi
            NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)")
          else
            NOTES=$(git log --pretty=format:"- %s (%h)")
          fi

          # Write notes to file (multi-line safe)
          echo "$NOTES" > /tmp/release-notes.md
          echo "last_tag=${LAST_TAG:-none}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Update stable branch
        run: |
          if git ls-remote --exit-code --heads origin stable >/dev/null 2>&1; then
            echo "Fast-forwarding stable → ${{ inputs.version }}"
            git fetch origin stable:stable 2>/dev/null || git branch -f stable origin/stable
            git branch -f stable "${{ inputs.version }}"
            git push origin stable
          else
            echo "Creating stable branch at ${{ inputs.version }}"
            git branch stable "${{ inputs.version }}"
            git push -u origin stable
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "Kōan ${{ inputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --latest
